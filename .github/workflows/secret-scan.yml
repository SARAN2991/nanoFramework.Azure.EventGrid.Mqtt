name: Secret Scanning (gitleaks)

# Scans every push and pull-request for accidentally committed credentials,
# PEM private-key headers, and other secrets.
#
# Why this is important for this repo
# ────────────────────────────────────
# Device firmware commonly contains X.509 certificates and private keys.
# A const-string PEM that is committed even once is permanently in Git history
# and must be treated as compromised — regardless of whether the code is
# later cleaned up.  This workflow catches those commits before they merge.
#
# How to enable GitHub native secret scanning as well (free, zero-config):
#   Repository Settings → Security → Secret scanning → Enable push protection
# That will block pushes containing well-known secret patterns automatically.

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  gitleaks:
    name: Detect secrets with gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # required to upload SARIF results

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required for accurate delta scanning

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Set GITLEAKS_LICENSE if you have a gitleaks pro license
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
